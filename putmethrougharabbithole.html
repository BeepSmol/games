            DIG DOWN
        </button>

            <h2 id="holeTitle" class="text-3xl font-bold mb-4 uppercase border-b-4 border-black pb-2"></h2>

                <!-- Tags injected by JS -->
            </div>

            <p id="holeDesc" class="text-lg leading-relaxed mb-8"></p>
            
            <a id="holeLink" href="#" target="_blank" class="block w-full text-center border-4 border-black bg-black text-white px-4 py-3 text-xl font-bold hover:bg-white hover:text-black transition-colors">

            </button>

                <div id="relatedContent" class="flex justify-between items-center">

                    <button id="relatedBtn" class="text-sm border-2 border-black px-4 py-2 hover:bg-black hover:text-white transition-colors font-bold">GO THERE</button>
                </div>
            </div>
        </div>

        <!-- TOAST CONTAINER -->
        <div id="toastContainer" class="fixed top-20 right-5 z-[100] flex flex-col gap-2 pointer-events-none"></div>

        <!-- MENU BUTTON -->
        <button onclick="toggleMenu()" class="fixed top-5 right-5 z-50 bg-white text-black border-4 border-black px-6 py-2 font-bold uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-200 transition-all hover:translate-y-1 hover:shadow-none">
            HISTORY
        </button>

        <!-- MENU MODAL -->
        <div id="menuModal" class="fixed inset-0 bg-black/80 z-50 hidden flex justify-end transition-opacity duration-300" onclick="if(event.target === this) toggleMenu()">
            <div class="w-full max-w-md h-full bg-white border-l-4 border-black flex flex-col shadow-[-10px_0px_0px_0px_rgba(0,0,0,0.5)] transform transition-transform duration-300 translate-x-full" id="menuContent">

                    <div class="flex items-center gap-4">

        <div class="mt-8 text-center flex flex-wrap justify-center gap-4">
            <a href="https://forms.gle/K68Jmuo9oeV48sBJ9" target="_blank" class="inline-block px-8 py-3 border-4 border-black bg-white hover:bg-yellow-200 active:bg-yellow-400 font-bold text-sm uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:-translate-y-0.5 hover:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:translate-y-0 active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Submit a Suggestion</a>
            <a href="https://forms.gle/W9CN7cxt5NeiERvY8" target="_blank" class="inline-block px-8 py-3 border-4 border-black bg-white hover:bg-red-200 active:bg-red-400 font-bold text-sm uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-all hover:-translate-y-0.5 hover:shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:translate-y-0 active:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]">Report a Broken Link</a>

                tags: ["UNSOLVED", "MURDER", "WWII"],
                desc: "The discovery of a woman's skeleton in a wych elm tree in England in 1943 during WWII. Graffiti asking 'Who put Bella in the Wych Elm?' began appearing in 1944. The victim's identity remains unknown.",
                link: "https://en.wikipedia.org/wiki/Who_put_Bella_in_the_Wych_Elm%3F"
            },
            {
                title: "Phantom Time Hypothesis",
                tags: ["HISTORY", "CONSPIRACY", "TIME"],
                desc: "A historical conspiracy theory asserting that the Early Middle Ages (614-911 AD) were fabricated and that we are actually living in the 18th century. It claims Charlemagne was made up.",
                link: "https://en.wikipedia.org/wiki/Phantom_time_hypothesis"
            }
        ];

        // --- Sound Effects ---
        const SFX = {
            ctx: null,
            init: function() {
                if (!this.ctx) {
                    try {
                        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                    } catch(e) {
                        console.error("Web Audio API not supported.");
                    }
                }
            },
            play: function(type) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();

                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                gain.connect(this.ctx.destination);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime);
                osc.connect(gain);

                if (type === 'dig') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.3);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.3);
                } else if (type === 'reveal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.4);
                }
                osc.start();
                osc.stop(this.ctx.currentTime + 0.4);
            }
        };

        // --- History & Saved Logic (LocalStorage) ---
        const STORAGE_KEY_HISTORY = "rabbithole_history_v2";
        const STORAGE_KEY_SAVED = "rabbithole_saved_v2";
        
        function getHistory() {
            try {
                const item = localStorage.getItem(STORAGE_KEY_HISTORY);
                return item ? JSON.parse(item) : [];
            } catch (e) { return []; }
        }

        function saveHistory(hole) {
            let history = getHistory();
            // Remove duplicates if any
            history = history.filter(h => h.title !== hole.title);
            
            // Add to front with timestamp
            const now = new Date();
            const timestamp = now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
            history.unshift({ title: hole.title, link: hole.link, time: timestamp });
            
            // Keep last 10
            if (history.length > 10) history = history.slice(0, 10);
            
            localStorage.setItem(STORAGE_KEY_HISTORY, JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const history = getHistory();
            const container = document.getElementById('historyContainer');
            const list = document.getElementById('historyList');
            
            if (history.length === 0) {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            list.innerHTML = history.map(h => `
                <li class="flex items-center justify-between group p-1 hover:bg-gray-200 rounded">
                    <div class="flex-1 min-w-0">
                        <a href="${h.link}" target="_blank" class="block hover:bg-yellow-200 font-bold uppercase truncate border-b-2 border-transparent hover:border-black transition-colors">
                            <span class="text-yellow-600 font-bold group-hover:text-black mr-1">>></span>${h.title}
                        </a>
                        <div class="text-[10px] text-gray-500 font-mono ml-4">${h.time || ''}</div>
                    </div>
                    <button onclick="saveItem(JSON.parse(decodeURIComponent('${encodeURIComponent(JSON.stringify(h))}')))" class="text-green-600 hover:text-green-800 text-lg p-2 shrink-0" title="Save for Later">★</button>
                </li>
            `).join('');
        }

        window.clearHistory = function() {
            if(confirm("Clear browsing history?")) {
                localStorage.removeItem(STORAGE_KEY_HISTORY);
                renderHistory();
            }
        }

        window.exportData = function() {
            const history = getHistory();
            const saved = getSaved();

            if (history.length === 0 && saved.length === 0) {
                showToast("NOTHING TO EXPORT!", "text-red-500 bg-red-100");
                return;
            }

            let content = "RABBIT HOLE EXPORT\n";
            content += "====================\n\n";

            if (saved.length > 0) {
                content += "SAVED FOR LATER\n";
                content += "--------------------\n";
                saved.forEach(h => { content += `${h.title}\n${h.link}\n\n`; });
            }

            if (history.length > 0) {
                content += "HISTORY\n";
                content += "--------------------\n";
                history.forEach(h => { content += `${h.title} (at ${h.time})\n${h.link}\n\n`; });
            }
            
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'rabbit_hole_export.txt';
            document.body.appendChild(a); a.click();
            document.body.removeChild(a); URL.revokeObjectURL(url);
            showToast("EXPORTED TO TXT!", "text-blue-600 bg-blue-100");
        }

        // --- Saved Logic ---
        function getSaved() {
            try {
                const item = localStorage.getItem(STORAGE_KEY_SAVED);
                return item ? JSON.parse(item) : [];
            } catch (e) { return []; }
        }

        function saveItem(hole) {
            if (!hole || !hole.title || !hole.link) return false;
            let saved = getSaved();
            
            // Avoid duplicates
            if (saved.some(h => h.title === hole.title)) {
                showToast("ALREADY SAVED!", "text-yellow-600 bg-yellow-100");
                return false;
            }

            saved.unshift({ title: hole.title, link: hole.link });
            
            localStorage.setItem(STORAGE_KEY_SAVED, JSON.stringify(saved));
            renderSaved();
            
            showToast("SAVED FOR LATER!", "text-green-700 bg-green-100");
            return true;
        }

        function saveToLater() {
            if (saveItem(currentHole)) {
                saveBtn.innerText = "SAVED ✓";
            }
        }

        window.removeSaved = function(index) {
            let saved = getSaved();
            saved.splice(index, 1);
            localStorage.setItem(STORAGE_KEY_SAVED, JSON.stringify(saved));
            renderSaved();
        }

        function renderSaved() {
            const saved = getSaved();
            const container = document.getElementById('savedContainer');
            const list = document.getElementById('savedList');
            
            if (saved.length === 0) {
                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            list.innerHTML = saved.map((h, i) => `
                <li class="flex items-center justify-between group bg-white border-2 border-transparent hover:border-black p-2 transition-all shadow-sm">
                    <div class="flex items-center gap-2 overflow-hidden">
                        <span class="text-green-600 font-bold shrink-0">★</span>
                        <a href="${h.link}" target="_blank" class="font-bold uppercase truncate hover:underline text-black">${h.title}</a>
                    </div>
                    <button onclick="removeSaved(${i})" class="text-red-500 font-bold hover:bg-red-500 hover:text-white px-2 py-1 text-xs border border-transparent hover:border-black transition-colors uppercase">Remove</button>
                </li>
            `).join('');
        }

        function displayHole(hole) {
            currentHole = hole;

            // Populate Data
            titleEl.innerText = hole.title;
            descEl.innerText = hole.desc;
            linkEl.href = hole.link;

            // Clear and populate tags
            tagsEl.innerHTML = '';
            hole.tags.forEach(tag => {
                const span = document.createElement('span');
                span.className = "bg-black text-white px-2 py-1 uppercase";
                span.innerText = tag;
                tagsEl.appendChild(span);
            });

            // Show Container
            outputContainer.classList.remove('hidden');
            
            // Reset Button states
            btn.innerText = "DIG AGAIN";
            saveBtn.innerText = "SAVE FOR LATER";
            shareBtn.innerText = "SHARE FINDING";
            
            // Save to history
            saveHistory(hole);

            // --- Find and Display Related Rabbit Hole ---
            const relatedContainer = document.getElementById('relatedContainer');
            const relatedTitleEl = document.getElementById('relatedTitle');
            const relatedBtn = document.getElementById('relatedBtn');

            const relatedPool = rabbitHoles.filter(h =>
                h.title !== hole.title && h.tags.some(tag => hole.tags.includes(tag))
            );

            if (relatedPool.length > 0) {
                const relatedHole = relatedPool[Math.floor(Math.random() * relatedPool.length)];
                
                relatedTitleEl.innerText = relatedHole.title;
                
                relatedBtn.onclick = () => {
                    SFX.init();
                    SFX.play('dig');
                    setTimeout(() => {
                        SFX.play('reveal');
                        displayHole(relatedHole);
                        // Scroll to the top of the container to see the new result
                        outputContainer.scrollIntoView({ behavior: "smooth", block: "start" });
                    }, 400);
                };
                
                relatedContainer.classList.remove('hidden');
            } else {
                relatedContainer.classList.add('hidden');
            }
        }

        // DOM Elements
        const btn = document.getElementById('generateBtn');
        const outputContainer = document.getElementById('outputContainer');
        const titleEl = document.getElementById('holeTitle');
        const tagsEl = document.getElementById('holeTags');
        const descEl = document.getElementById('holeDesc');
        const linkEl = document.getElementById('holeLink');
        const filterSelect = document.getElementById('tagFilter');
        const shareBtn = document.getElementById('shareBtn');
        const saveBtn = document.getElementById('saveBtn');
        let currentHole = null;

        // Populate Filter
        const allTags = new Set();
        rabbitHoles.forEach(h => h.tags.forEach(t => allTags.add(t)));
        Array.from(allTags).sort().forEach(tag => {
            const opt = document.createElement('option');
            opt.value = tag;
            opt.innerText = tag;
            filterSelect.appendChild(opt);
        });

        // Logic
        btn.addEventListener('click', () => {
            // Init and play sounds
            SFX.init();
            SFX.play('dig');

            // Filter based on selection
            const category = filterSelect.value;
            const pool = category === "ALL" ? rabbitHoles : rabbitHoles.filter(h => h.tags.includes(category));
            
            // Pick a random entry from pool
            const randomIndex = Math.floor(Math.random() * pool.length);
            const hole = pool[randomIndex];
            
            // Add a little text glitch effect to the button for feedback
            btn.innerText = "DIGGING...";
            
            setTimeout(() => {
                // Play reveal sound
                SFX.play('reveal');
                displayHole(hole);

                // Scroll down slightly so mobile users see the result
                outputContainer.scrollIntoView({ behavior: "smooth", block: "nearest" });

            }, 400); // Small artificial delay to make it feel like it's "computing"
        });

        shareBtn.addEventListener('click', () => {
            if(!currentHole) return;
            const text = `Come explore ${currentHole.title} with me at: ${currentHole.link} !`;
            navigator.clipboard.writeText(text).then(() => {
                shareBtn.innerText = "COPIED!";
                setTimeout(() => shareBtn.innerText = "SHARE FINDING", 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        });

        // --- UI Utils ---
        function toggleMenu() {
            const modal = document.getElementById('menuModal');
            const content = document.getElementById('menuContent');
            if (modal.classList.contains('hidden')) {
                modal.classList.remove('hidden');
                // Trigger reflow
                void modal.offsetWidth;
                content.classList.remove('translate-x-full');
            } else {
                content.classList.add('translate-x-full');
                setTimeout(() => modal.classList.add('hidden'), 300);
            }
        }

        function showToast(msg, colors="bg-black text-white") {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `border-4 border-black p-4 font-bold uppercase shadow-[4px_4px_0px_0px_rgba(0,0,0,0.5)] transition-all transform translate-x-full pointer-events-auto ${colors}`;
            el.innerText = msg;
            container.appendChild(el);
            requestAnimationFrame(() => el.classList.remove('translate-x-full'));
            setTimeout(() => { el.classList.add('translate-x-full'); setTimeout(() => el.remove(), 300); }, 2500);
        }
        
        saveBtn.addEventListener('click', saveToLater);

        // Init history
        renderHistory();
        renderSaved();
    </script>
</body>
</html>
